# Deliberately does NOT set orioledb.enable_stopevents: this workload has
# no deterministic construction of the sk_modify_pending race described in
# https://github.com/orioledb/orioledb/issues/855. It only maximizes the
# odds of an automatic checkpoint overlapping concurrent DML, then leans on
# Antithesis's own fault injection to land inside that overlap.
checkpoint_timeout = 30s
max_wal_size = 64MB
checkpoint_completion_target = 0.1
