# Enables pg_stopevent_set()/pg_stopevent_reset() so the sk-recovery-race
# driver can pin backends at the PK-applied/SK-pending boundary described
# in https://github.com/orioledb/orioledb/issues/855.
orioledb.enable_stopevents = on

# Keep automatic checkpoints out of the way of the driver's own explicit
# CHECKPOINT calls, matching test/t/recovery_test.py's
# _sk_modify_pending_setup.
checkpoint_timeout = 1d
max_wal_size = 4GB
