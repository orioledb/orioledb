name: check

on:
  push:
  pull_request:

jobs:
  matrix:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: python
        run: |
          import os, json, itertools

          event_name = os.environ["GITHUB_EVENT_NAME"]
          ref        = os.environ.get("GITHUB_REF_NAME", "")

          check_types = [
              "normal", "debug", "sanitize", "check_page",
              "valgrind_1", "valgrind_2", "pg_tests", "dm_log_writes",
          ]

          # dm-log-writes needs a kernel module unavailable on arm64 runners
          def make_matrix(combos):
              return {
                  "include": [
                      {"cpu": cpu, "pg_version": pg, "compiler": comp, "check_type": ct}
                      for (cpu, pg, comp), ct in itertools.product(combos, check_types)
                      if not (cpu == "arm64" and ct == "dm_log_writes")
                  ]
              }

          full_combos = list(itertools.product(
              ["amd64", "arm64"], [16, 17, 18], ["clang", "gcc"]
          ))

          # Push to non-main branches: limited set to save CI time.
          # PG18 is the current development target, so it keeps both
          # cpu/compiler combos; PG16 and PG17 each get one combo as a
          # smoke check.  We rotate which cpu+compiler each older major
          # lands on between (amd64,gcc) and (arm64,clang) using the
          # commit SHA, so a feature branch series exercises both
          # architectures for both older majors over time.  Each push
          # still has all four cpu/compiler cells covered (across the
          # three majors), and the total job count is unchanged.
          # Main pushes and fork PRs continue to exercise the full
          # matrix unconditionally.
          sha_hex = os.environ.get("GITHUB_SHA", "0") or "0"
          flip = int(sha_hex[:8], 16) % 2
          older_a = ("amd64", "gcc") if flip == 0 else ("arm64", "clang")
          older_b = ("arm64", "clang") if flip == 0 else ("amd64", "gcc")
          branch_combos = [
              (older_a[0], 16, older_a[1]),
              (older_b[0], 17, older_b[1]),
              ("amd64", 18, "gcc"),
              ("arm64", 18, "clang"),
          ]

          # Same-repo PRs: complementary set covering what branch_combos skips
          pr_combos = [
              ("arm64", 16, "gcc"),
              ("amd64", 16, "clang"),
              ("arm64", 17, "gcc"),
              ("amd64", 17, "clang"),
              ("arm64", 18, "gcc"),
              ("amd64", 18, "clang"),
          ]

          if ref == "ci_fixes":
              # Stress run: hunt the flaky 027_stream_regress / replication
              # regress hang.  Fan out 64 pg_tests jobs on PG18 (where the
              # hang appears -- PG18 AIO io workers), across both cpus and
              # compilers, 16 replicas each.  The `replica` field only makes
              # the matrix entries (hence job names) distinct.
              matrix = {"include": [
                  {"cpu": cpu, "pg_version": 18, "compiler": comp,
                   "check_type": "pg_tests", "replica": r}
                  for cpu in ("amd64", "arm64")
                  for comp in ("clang", "gcc")
                  for r in range(1, 17)
              ]}
          else:
              if event_name == "pull_request":
                  with open(os.environ["GITHUB_EVENT_PATH"]) as f:
                      pr_event = json.load(f)
                  head_repo = pr_event["pull_request"]["head"]["repo"]["full_name"]
                  base_repo = pr_event["pull_request"]["base"]["repo"]["full_name"]
                  # Fork PRs get the full matrix; same-repo PRs get the complementary set
                  combos = full_combos if head_repo != base_repo else pr_combos
              elif ref == "main":
                  combos = full_combos
              else:
                  combos = branch_combos
              matrix = make_matrix(combos)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")

  check:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    # Select runner based on CPU architecture
    runs-on: ${{ matrix.cpu == 'arm64' && 'blacksmith-8vcpu-ubuntu-2404-arm' || 'blacksmith-8vcpu-ubuntu-2404' }}
    env:
      LLVM_VER: 18
      CPU: ${{ matrix.cpu }}
      CHECK_TYPE: ${{ matrix.check_type }}
      PG_VERSION: ${{ matrix.pg_version }}
      COMPILER: ${{ matrix.compiler }}
    steps:
      - name: Checkout extension code into workspace directory
        uses: actions/checkout@v6
        with:
          path: orioledb

      - name: Get the required tag name
        shell: bash
        run: |
          echo "PGTAG=$(grep '^${{ matrix.pg_version }}: ' orioledb/.pgtags | cut -d' ' -f2-)" >> $GITHUB_ENV

      - name: Checkout PostgreSQL code into workspace directory
        uses: actions/checkout@v6
        with:
          repository: orioledb/postgres
          ref: ${{ env.PGTAG }}
          path: postgresql

      - name: Setup prerequisites
        run: bash ./orioledb/ci/prerequisites.sh

      - name: Build
        run: bash ./orioledb/ci/build.sh

      - name: Install post build prerequisites
        run: bash ./orioledb/ci/post_build_prerequisites.sh

      - name: Check
        timeout-minutes: ${{ startsWith(matrix.check_type, 'valgrind_') && 150 || (matrix.check_type == 'dm_log_writes' && 60 || (matrix.check_type == 'sanitize' && 40 || 30)) }}
        run: bash ./orioledb/ci/check.sh

      - name: Check output
        run: bash ./orioledb/ci/check_output.sh
        if: ${{ success() || failure() }}

      - name: Upload tests diffs
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: ${{ matrix.pg_version }}_${{ matrix.cpu }}_${{ matrix.compiler }}_${{ matrix.check_type }}_test.diffs${{ matrix.replica && format('_r{0}', matrix.replica) || '' }}
          path: |
            ./orioledb/test/**/regression.diffs
            ./orioledb/test/**/isolation_filtered.diffs
            ./postgresql/src/test/**/regression.diffs
            ./postgresql/src/test/**/isolation_filtered.diffs
            ./postgresql/dump_diff_*.txt
          retention-days: 2
          if-no-files-found: ignore

      - name: Upload tests logs
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: ${{ matrix.pg_version }}_${{ matrix.cpu }}_${{ matrix.compiler }}_${{ matrix.check_type }}_test.logs${{ matrix.replica && format('_r{0}', matrix.replica) || '' }}
          path: |
            ./orioledb/test/tmp_check_t/*/logs/*log
            ./orioledb/test/tmp_check/log/*log
            ./orioledb/test/tmp_check_iso/log/*log
            ./orioledb/test/log/*.log
            ./postgresql/pg.log
            ./postgresql/rep_pg.log
            ./postgresql/src/test/**/tmp_check/*.dump
            ./postgresql/src/test/**/tmp_check/log/*
          retention-days: 2
          if-no-files-found: ignore

      - name: Show stuck processes
        run: bash ./orioledb/ci/list_stuck.sh
        if: ${{ always() }}

      - name: Run lcov
        if: ${{ matrix.check_type != 'sanitize' && matrix.check_type != 'check_page' }}
        run: bash ./orioledb/ci/lcov.sh

      - name: Create artifact for coverage.info
        if: ${{ matrix.check_type != 'sanitize' && matrix.check_type != 'check_page' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.pg_version }}_${{ matrix.cpu }}_${{ matrix.compiler }}_${{ matrix.check_type }}_coverage.info${{ matrix.replica && format('_r{0}', matrix.replica) || '' }}
          path: ./orioledb/coverage.info
          retention-days: 1
          overwrite: true

  finish:
    needs: check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout extension code into workspace directory
        uses: actions/checkout@v6
        with:
          path: orioledb

      - name: Retrieve saved coverage.infos
        uses: actions/download-artifact@v8

      - name: Merge coverage files
        run: bash ./orioledb/ci/lcov_merge.sh

      - name: coveralls
        uses: coverallsapp/github-action@v2
        with:
          files: ./orioledb/coverage.info

  cleanup:
    needs: finish
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: remove artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: "*coverage.info"
          failOnError: false
